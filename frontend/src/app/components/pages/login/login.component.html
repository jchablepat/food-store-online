<div class="container">
    <div class="details">
        <app-title title="Login"></app-title>
        <form [formGroup]="loginForm" (submit)="Login()">
            <text-input [control]="FormControls['email']" [showErrorsWhen]="isSubmitted" type="email" label="Email" />
            <text-input [control]="FormControls['password']" [showErrorsWhen]="isSubmitted" type="password" label="Password"  />

            <default-button text="Login"></default-button>
            <div class="register">
                New user? &nbsp;
                <a routerLink="/register" [queryParams]="{ returnUrl: returnUrl }">Register here</a>
            </div>
        </form>
    </div>
</div>
